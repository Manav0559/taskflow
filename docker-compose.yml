services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  jaeger:
    # all-in-one accepts OTLP/HTTP natively on 4318 in recent images - no collector
    # needed for a single-node/dev setup like this.
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318"   # OTLP/HTTP receiver

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://taskflow:taskflow@postgres:5432/taskflow?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      HTTP_ADDR: :8080
      METRICS_ADDR: :9090
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4318
    ports:
      - "8080:8080"
      - "9090:9090"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    # depends_on api (in addition to postgres) is not a hard technical requirement -
    # worker doesn't call api - but it keeps the worker from racing api's first-run
    # migration against its own on cold start.
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgres://taskflow:taskflow@postgres:5432/taskflow?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      METRICS_ADDR: :9090
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4318
    ports:
      - "9091:9090"

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgres://taskflow:taskflow@postgres:5432/taskflow?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      METRICS_ADDR: :9090
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4318
    ports:
      - "9092:9090"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9093:9090"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

volumes:
  postgres-data:
