global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:9090"]
  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9090"]
  - job_name: scheduler
    metrics_path: /metrics
    static_configs:
      - targets: ["scheduler:9090"]
